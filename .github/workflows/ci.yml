name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux-musl:
    name: Build x86_64 Linux musl
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-cargo-${{ runner.os }}-x86_64-unknown-linux-musl-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ci-cargo-${{ runner.os }}-x86_64-unknown-linux-musl-
            ci-cargo-${{ runner.os }}-

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: cross build --release --locked --target x86_64-unknown-linux-musl
